<body class="reg text-white" > 
  <div id="loader" class="loader-overlay"><div class="spinner"></div></div>
  <nav class="navbar  justify-content-center">
    <div class="nav-brand ">
     <h2><b>DonorConnect</b></h2></div>
  </nav>
  <section id="register">
  <div class=" container d-flex align-items-center justify-content-center dvh-100">
    
    <div class="row card1" style="max-width:700%; width: 70%; ">
      <b><h3 class="mb-4 text-center text-dark">Register Here</h3></b>
       
      <div class="col-md-6 py-2 ">
         <form onsubmit="registerUser(event,this)">
          <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control bg-light text-dark border-secondary" placeholder="Enter Full Name" required />
          </div>
          <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control bg-light text-dark border-secondary" placeholder="Enter your Email" required />
          </div>
          
          <div class="mb-3">
             <select id="city" class="form-control">
                <option value="">Select City</option>
                <option>Amritsar</option>
                <option>Delhi</option>
                <option>Chandigarh</option>
                <option>Mumbai</option>
                <option>Bangalore</option>
                <option>Chennai</option>
                <option>Ahmedabad</option>
            </select>
          </div>
          <div class="mb-3">
            <input type="tel" id="phone" name="tel" maxlength="10" pattern="\d{10}" class="form-control bg-light text-dark border-secondary" placeholder="Enter 10-digit Mobile number" required/>
          </div>
          <div class="mb-2">
            <label>Password</label>
            <input type="password" name="password" class="form-control bg-light text-dark border-secondary" placeholder="Create your password" required />
          </div>
        </div>
          <div class="col-md-6 py-2">
          <div>
            <label>Who are you?</label>
          <select name="role" id="role" class="form-control border-secondary mb-3" required>
            <option value="">Select role</option>
            <option value="donor">Donor</option>
            <option value="ngo">NGO</option>
          </select>
        </div>
        <div id="ngoFields" class="mb-3">
          <label>Address</label>
          <input type="text" name="address" id="address" placeholder="Address of NGO" class="form-control border-secondary bg-light text-dark mb-3 ">
          <label>Categories</label>
          <!-- <input type="text" name="category" id="categories" placeholder="Accepted Categories" class="form-control border-secondary bg-light text-dark "> -->
        <select name="category" id="category" class="form-control" >
    <option value="">Select Category</option>
    <option value="General">General</option>
    <option value="Clothes">Clothes</option>
    <option value="Food">Food</option>
    <option value="Books">Books</option>
    <option value="Medicines">Medicines</option>
    <option value="Furniture">Furniture</option>
    <option value="Electronics">Electronics</option>
</select>
        </div>
        
          <div class="form-check mb-4 justify-content-start align-items-start">
            <input class="form-check-input" type="checkbox" id="terms" required />
            <label class="form-check-label text-dark" for="terms">
              I agree to the Terms & Conditions
            </label> 
          </div>
          
          <button type="submit" class="btn btn-outline-light w-100 mb-3"><b>Create Account</b></button>
          
        </form>
       <p class="mt-3 text-center text-dark"><b>
          Already have an account? </b> <a href="login.html" class="btn btn-outline-light text-decoration-none ">Login</a>
        </p> 
      </div>
    </div>
  </div>
</section>

<script>
  function validatephone(phone){return /^\d{10}$/.test(phone);
  
  let tel=form.tel.value.trim();
  if(!/^\d{10}$/.test(phone)){
    alert("Phone number must be 10-digits");
    return;
  }
}
function registerUser(event, form){
  showLoader();
  event.preventDefault();
  console.log("Register func called");

  let name = form.name.value.trim();
  let email = form.email.value.trim().toLowerCase();
  let password = form.password.value.trim();
  let city = document.getElementById("city").value;
  let role = form.role.value.trim();
  let tel=form.tel.value.trim();
  let address=form.address.value.trim();
  let category=document.getElementById("category").value;
  if(role === ""){
    alert("Please select a role");
    return;
  }

 

let users=JSON.parse(localStorage.getItem("users")) || [];
let ngos=JSON.parse(localStorage.getItem("ngos")) || [];
let existingUser=users.find(u=>u.email=== email);
let existingNgo=ngos.find(n=>n.email===email);
if(existingUser || existingNgo){
  alert("Email already registered");
  window.location.href="login.html";
}

  let user = {
    name: name,
    email: email,
    password: password,
    role: role,
    city: city,
    phone: tel,
    address,
    category
  };
  
fetch(`http://localhost:5000/api/register`,{
  method:"POST",headers:{"Content-type":"application/json"},
  body:JSON.stringify({
    name: name,
    email: email,
    password: password,
    role: role,
    city: city,
    phone: tel,
    address,
    category
  })
})
.then(res=>res.json())
.then(data=>{
  alert(data.message || data);
  window.location.href="login.html";
})
.finally(()=>hideLoader())
.catch(err=>{
  console.log(err);
  alert("Error registering user");
});
  if(role === "ngo" && category===""){
    alert("Please select category");
    return;
    user.category = [];  
   
  } 
  else {
    
  }
  
 }
const roleSelect = document.getElementById("role");
const ngoFields = document.getElementById("ngoFields");

function toggleFields() {
  if (roleSelect.value === "ngo") {
    ngoFields.style.display = "block";
  } else {
    ngoFields.style.display = "none";
  }
}

// Run on change
roleSelect.addEventListener("change", toggleFields);

// Run on page load
document.addEventListener("DOMContentLoaded", toggleFields);

function showLoader(){
    document.getElementById("loader").style.display="flex";
}
function hideLoader(){
    document.getElementById("loader").style.display="none";
}
</script>
