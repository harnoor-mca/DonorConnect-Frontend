<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Donor Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="loader-overlay"><div class="spinner"></div></div>
<header class="header">
    <h2><b>DonorConnect</b></h2></header>
<nav class="navbar">
    
    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a> &nbsp;
        <a href="donordash.html">Dashboard</a> &nbsp;
        <a href="login.html" onclick="logout()">Logout</a>
    </div>
</nav>
<section  class="dashboard text-dark">
    <div id="welcometext" class="donorhead text-dark">
    
</div>
    <div class="container mt-4 justify-content-center align-items-center">
    <div class="row g-2">
        <div class="col-md-6">
            <select id="cityFilter" class="form-control">
                <option value="">Select City</option>
                <option>Amritsar</option>
                <option>Delhi</option>
                <option>Chandigarh</option>
                <option>Mumbai</option>
                <option>Bangalore</option>
                <option>Chennai</option>
                <option>Ahmedabad</option>
            </select>
        </div>

        <div class="col-md-6">
            <select id="categoryFilter" class="form-control">
                <option value="">Select Category</option>
                <option value="All" selected>All NGOs</option>
                <option>Clothes</option>
                <option>Food</option>
                <option>Books</option>
                <option>Medicines</option>
                <option>Furniture</option>
                <option>Electronics</option>
            </select>
        </div>

        <div class="">
            <button onclick="searchNGO()" class="my-btndo">
                Search NGOs
            </button>
        </div>
    </div>
</div>
<div id="ngoResults" class="container mt-4 "></div>
    <table class="table table-bordered table-striped mt-4">
    <thead class="table-dark">
        <tr>
            <th>NGO</th>
            <th>Category</th>
            <th>Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody id="myDonationTable"></tbody>
</table>


</section>

<script>
document.addEventListener("DOMContentLoaded",function(){

let storedUser = JSON.parse(localStorage.getItem("loggedInUser"));
if(!storedUser || storedUser.role !== "donor"){
    window.location.href = "login.html";
}

document.getElementById("welcometext").innerText =
    "Welcome, " + storedUser.user.full_name;
    loadMyDonations();
});
function logout() {
    localStorage.removeItem("loggedInUser");
}


function sendRequest(ngoId,category){
    showLoader();
    console.log("Category sent:",category);
    let user = JSON.parse(localStorage.getItem("loggedInUser"));

    fetch("https://donorconnect-backend.onrender.com/api/donate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            donor_id: user.user.donor_id,
        ngo_id: ngoId,
        donation_type: category,
        quantity: 1,
        message: "Donation request",
        status: "Pending",
        request_date: new Date().toISOString().split("T")[0]
    
        })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadMyDonations();
    })
    .finally(()=>hideLoader())
    .catch(err => console.log(err));
}
function loadMyDonations(){
showLoader();
    let user = JSON.parse(localStorage.getItem("loggedInUser"));
    if(!user) return;

fetch(`https://donorconnect-backend.onrender.com/api/my-donations/${user.user.donor_id}`)
.then(res=>res.json())
.then(data=>{
    let table=document.getElementById("myDonationTable");
    table.innerHTML="";
    if(data.length === 0){
        table.innerHTML =
            `<tr><td colspan="5">No donations found</td></tr>`;
        return;
    }
    data.forEach((donation)=>{

        let row = `
<tr>
    <td>${donation.organisation_name}</td>
    <td>${donation.donation_type}</td>
    <td>${donation.request_date.split("T")[0]}</td>
 <td>${donation.status}</td>
    <td>
        ${donation.status === "Pending" ?
            `<button onclick="cancelDonation('${donation.request_id}','${donation.ngoName}','${donation.category}')">
                Cancel
            </button>` : ""}
    </td>
</tr>`;
table.innerHTML+=row;
    });
})
.finally(()=>hideLoader())
.catch(err=>console.log(err));
}

function cancelDonation(request_id){
    showLoader();
    fetch(`https://donorconnect-backend.onrender.com/api/donation/${request_id}`,{
        method:"DELETE"
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        loadMyDonations();
    })
    .finally(()=>hideLoader())
    .catch(err=>console.log(err));
}

function searchNGO(){

    let city = document.getElementById("cityFilter").value;
    let category = document.getElementById("categoryFilter").value;

    if(!city || !category){
        alert("Please select both city and category");
        return;
    }
    showLoader();
    fetch("https://donorconnect-backend.onrender.com/api/ngos")
    .then(res => res.json())
    .then(ngos => {
        console.log("NGO data:",ngos);
        
        let filtered = ngos.filter(n => {
    const ngoCity = (n.city || "").trim().toLowerCase();
    const ngoCategory = (n.category || "").trim().toLowerCase();

    const selectedCity = city.trim().toLowerCase();
    const selectedCategory = category.trim().toLowerCase();
    if(selectedCategory==="all"){ return ngoCity===selectedCity;}
return (ngoCity===selectedCity&& (selectedCategory==="general"||ngoCategory===selectedCategory));
    console.log("CHECK:", ngoCity, selectedCity, ngoCategory, selectedCategory);

    
});

        let resultDiv = document.getElementById("ngoResults");
        resultDiv.innerHTML = "";

        if(filtered.length === 0){
            resultDiv.innerHTML = "<p>No NGOs found.</p>";
            return;
        }

        let rowHTML = `<div class="row g-3">`;

        filtered.forEach(ngo => {
            rowHTML += `
            <div class="col-md-6 mb-3">
                <div class="dash-card h-100">
                   <div class="bg-dash"> <h4><b>${ngo.organisation_name}</b></h4>  </div>
                    <h6><b>City: </b> ${ngo.city}</h6>
                    <h6><b>Category: </b> ${ngo.category}</h6>
                    <h6><b>Email-id: </b> <a href="mailto: ${ngo.email}">${ngo.email}</a></h6>
                    
                     
                 
                    
    ${ngo.is_registered==1 ? `
    <h6><b>Phone number. : </b> <a href="tel:${ngo.phone}">${ngo.phone}</a></h6>
    <button class="my-btndo mt-3"
        onclick="sendRequest(${ngo.ngo_id}, '${ngo.category}')">
        Send Request
    </button> ` : `
    <h6><b>Phone number: </b> <a href="tel:${ngo.contact_phone}">${ngo.contact_phone}</a></h6>
      <h6><b>Website:  </b></h6><h6><a href="${ngo.website || "N/A"}" target="_blank">${ngo.website}</a>
                        </h6>
    </h6><a href="${ngo.website}" target="_blank" class="my-btndo1 btn-primary mt-3">
        Contact via Website
    </a>
`}
                </div>
            </div>
            `;
        });

        rowHTML += `</div>`;
        resultDiv.innerHTML = rowHTML;
    })
    .finally(()=>hideLoader())
    .catch(err => console.log(err));
}
function showLoader(){
    document.getElementById("loader").style.display="flex";
}
function hideLoader(){
    document.getElementById("loader").style.display="none";
}
</script>
</body>
</html>
