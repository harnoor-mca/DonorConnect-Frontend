<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel | DonorConnect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #009488; 
            font-family: 'Segoe UI', sans-serif; }
        .table-container { padding: 30px; }
        h2 { margin-bottom: 20px;
        color: aliceblue; }
        .btn-sm { margin: 2px; }
    </style>
</head>
<body>
<div id="loader" class="loader-overlay"><div class="spinner"></div></div>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">DonorConnect - Admin Panel</span>
    <button class="btn btn-outline-warning" onclick="logout()">Logout</button>
</nav>
<div class="table-container">
    <h2>Donors</h2>
    <div class="table-responsive">
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Select</th>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
                <th>Phone</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="donorTable"></tbody>
    </table>
    <button onclick="deleteSelected()" class="btn btn-danger align-items-center justify-content-center">Delete Selected</button>

    </div>

    <h2>NGOs</h2>
    <div class="search-container">
    <input type="text" id="ngosearch" class="form-control mb-3" placeholder="Search NGO by name..." onkeyup="filterNGO()"/>
    </div>
    <div class="table-responsive">
    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Select</th>
                <th>Name</th>
                <th>Email</th>
                <th>City</th>
                <th>Phone (Registered)</th>
                <th>Phone (Not-Registered)</th>
                <th>Categories</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="ngoTable"></tbody>
    </table>
    <button onclick="deleteSelected()" class="btn btn-danger align-items-center justify-content-center">Delete Selected</button>

    </div>
</div>

<script>
    let allNGOs=[];
document.addEventListener("DOMContentLoaded", function() {
    hideLoader();
    let storedUser = JSON.parse(localStorage.getItem("loggedInUser"));

    if (!storedUser || storedUser.role !== "Admin") {
        alert("Unauthorized Access!");
        window.location.href = "login.html";
        return;
    }

    loadUsers();
});

function loadUsers() {
    
    let users = JSON.parse(localStorage.getItem("users")) || [];
    let ngos = JSON.parse(localStorage.getItem("ngos")) || [];
    showLoader();
    Promise.all([
    fetch("https://donorconnect-backend.onrender.com/api/donors") 
    .then(res => res.json()),
    fetch("https://donorconnect-backend.onrender.com/api/ngos")
    .then(res => res.json()) ])
    .then(([users,ngos])=>{
    let donorTable = document.getElementById("donorTable");
    donorTable.innerHTML = "";
    users.forEach((u, index) => {
        donorTable.innerHTML += `
            <tr>
                <td><input type="checkbox" class="user-checkbox" value="${u.id}"</td>
                <td>${u.full_name}</td>
                <td>${u.email}</td>
                <td>${u.city}</td>
                <td>${u.phone}</td>
                
                <td>
                    <button class="btn btn-danger btn-sm" onclick="deleteDonor(${u.donor_id})">Delete</button>
                </td>
            </tr>
        `;
    });
    
        allNGOs=ngos;
        displayNGOs(ngos); })
        .catch(err=>console.log(err))
        .finally(()=>{setTimeout(()=>hideLoader(),2000);});
}
    
    function displayNGOs(ngos){
    let ngoTable = document.getElementById("ngoTable");
    ngoTable.innerHTML = "";
    ngos.forEach((n) => {
        ngoTable.innerHTML += `
            <tr>
                <td><input type="checkbox" class="user-checkbox" value="${n.id}"</td>
                <td>${n.organisation_name}</td>
                <td>${n.email}</td>
                <td>${n.city}</td>
                <td>${n.phone}</td>
                <td>${n.contact_phone}</td>
                <td>${n.category || ''}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="deleteNgo(${n.ngo_id})">Delete</button>
                </td>
            </tr>
        `;
    });

}

function deleteDonor(id) {
    if(!confirm("Are you sure?")) return;
    showLoader();
    fetch(`https://donorconnect-backend.onrender.com/api/admin/donor-del/${id}`,{
        method:"DELETE"
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        return loadUsers();
    })
    .finally(()=>hideLoader())
    .catch(err=>console.log(err));
}

function deleteNgo(id) {
    if(!confirm("Are you sure?")) return;
    showLoader();
    fetch(`https://donorconnect-backend.onrender.com/api/admin/ngo-del/${id}`,{
        method:"DELETE"
    })
    .then(res=>res.json())
    .then(data=>{
        alert(data.message);
        return loadUsers();
    })
    .finally(()=>hideLoader())
    .catch(err=>console.log(err));
}
function deleteSelected() {
    const checkboxes = document.querySelectorAll(".user-checkbox:checked");

    if (checkboxes.length === 0) {
        alert("Select at least one user");
        return;
    }

    const ids = [];
    checkboxes.forEach(cb => ids.push(cb.value));

    if (!confirm("Are you sure you want to delete selected users?")) return;

    fetch("https://donorconnect-backend.onrender.com/api/admin/delete-multiple-donor", {
        method: "DELETE",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ ids })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        location.reload();
    })
    .catch(err => {
        console.log(err);
        alert("Error deleting users");
    });
    fetch("https://donorconnect-backend.onrender.com/api/admin/delete-multiple-ngo", {
        method: "DELETE",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ ids })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        location.reload();
    })
    .catch(err => {
        console.log(err);
        alert("Error deleting users");
    });
}
function filterNGO(){
    let value=document.getElementById("ngosearch").value.toLowerCase();
    let filtered=allNGOs.filter(n=>n.organisation_name.toLowerCase().includes(value));
    displayNGOs(filtered);
}
function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}
function showLoader(){
    document.getElementById("loader").style.display="flex";
}
function hideLoader(){
    document.getElementById("loader").style.display="none";
}
</script>

</body>
</html>
