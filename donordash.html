function sendRequest(ngoId,category){
    let user = JSON.parse(localStorage.getItem("loggedInUser"));

    let requestData = {
        donor_id: user.user.donor_id,
        ngo_id: ngoId,
        donation_type: category,
        quantity: 1,
        message: "Donation request",
        status: "Pending",
        request_date: new Date().toISOString().split("T")[0]
    };

    fetch("http://localhost:5000/api/donate", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(requestData)
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        loadMyDonations();
    })
    .catch(err => console.log(err));
}
function loadMyDonations(){

    let user = JSON.parse(localStorage.getItem("loggedInUser"));
    if(!user) return;

fetch(`http://localhost:5000/api/my-donations/${user.user.donor_id}`)
.then(res=>res.json())
.then(data=>{
    let table=document.getElementById("myDonationTable");
    table.innerHTML="";
    if(data.length === 0){
        table.innerHTML =
            `<tr><td colspan="4">No donations found</td></tr>`;
        return;
    }
    data.forEach((donation)=>{

        let row = `
<tr>
    <td>${donation.organisation_name}</td>
    <td>${donation.donation_type}</td>
    <td>${donation.request_date.split("T")[0]}</td>
 <td>${donation.status}</td>
    <td>
        ${donation.status === "Pending" ?
            `<button onclick="cancelDonation('${donation.request_id}','${donation.ngoName}','${donation.category}')">
                Cancel
            </button>` : ""}
    </td>
</tr>`;
table.innerHTML+=row;
    });
})
.catch(err=>console.log(err));
}

function searchNGO(){
    let city = document.getElementById("cityFilter").value;
    let category = document.getElementById("categoryFilter").value;

    if(!city || !category){
        alert("Please select both city and category");
        return;
    }

    fetch("http://localhost:5000/api/ngos")
    .then(res => res.json())
    .then(ngos => {
        console.log("NGO data:",ngos);
        // let filtered = ngos.filter(n =>
        //     n.city.toLowerCase() === city.toLowerCase() && n.category.toLowerCase() === category.toLowerCase()
        // );
        let filtered = ngos.filter(n => {
    const ngoCity = (n.city || "").trim().toLowerCase();
    const ngoCategory = (n.category || "").trim().toLowerCase();

    const selectedCity = city.trim().toLowerCase();
    const selectedCategory = category.trim().toLowerCase();
return (ngoCity===selectedCity&& (selectedCategory==="all"||ngoCategory===selectedCategory));
    console.log("CHECK:", ngoCity, selectedCity, ngoCategory, selectedCategory);

    
});

        let resultDiv = document.getElementById("ngoResults");
        resultDiv.innerHTML = "";

        if(filtered.length === 0){
            resultDiv.innerHTML = "<p>No NGOs found</p>";
            return;
        }

        let rowHTML = `<div class="row">`;

        filtered.forEach(ngo => {
            rowHTML += `
            <div class="col-md-4 mb-2">
                <div class="dash-card h-100">
                    <h5><b>${ngo.organisation_name}</b></h5>
                    <h6><b>City:</b> ${ngo.city}</h6>
                    <h6><b>Category:</b> ${ngo.category}</h6>
                    <button class="my-btndo mt-auto"
                        onclick="sendRequest(${ngo.ngo_id},'${ngo.category}')">
                        Send Request
                    </button>
                </div>
            </div>
            `;
        });

        rowHTML += `</div>`;
        resultDiv.innerHTML = rowHTML;
    })
    .catch(err => console.log(err));
