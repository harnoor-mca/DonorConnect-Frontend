<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | DonorConnect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  
</head>
<body>
<div id="loader" class="loader-overlay"><div class="spinner"></div></div>
<nav class="navbar1 d-flex flex-column align-items-center justify-content-center">
    <h2 class="head "><b>DonorConnect</b></h2>
    <div class="nav-links" id="navLinks">
        <a href="index.html">Home</a>  &nbsp;
        <a href="login.html">Login</a> &nbsp;
        <a href="register.html">Register</a>
    </div>
</nav>

<section class="login-section">
    <div class="login-box">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <p class="text-dark">Login as Donor or Registered NGO</p>
            <button type="submit" class="my-btn " >Login</button>
        </form>

        <p class="text">
            Don’t have an account?
            <a href="register.html">Register here</a>
        </p>
    </div>
</section>

<script>
document.getElementById("loginForm").addEventListener("submit", function(event) {
    event.preventDefault();

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value.trim();

    if(email==="admin@donorconnect.com" && password==="admin@123"){
        let adminUser={
            name:"Admin",
            email: email,
            role:"Admin"
        };
        localStorage.setItem("loggedInUser",JSON.stringify(adminUser));
        window.location.href="admin.html";
        return;
    }
    showLoader();
    fetch("http://localhost:5000/api/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
    })
    .then(res => res.json())
    .then(data => {

        if(data.role === "donor"){
            localStorage.setItem("loggedInUser", JSON.stringify(data));
            window.location.href = "donordash.html";
        }
        else if(data.role === "ngo"){
            localStorage.setItem("loggedInUser", JSON.stringify(data));
            window.location.href = "ngodash.html";
        }
        else{
            alert("Invalid credentials!");
        }

    })
    .finally(()=>hideLoader())
    .catch(err => {
        console.log(err);
        alert("Error code : 500 , Internal Server error");
    });

});
function showLoader(){
    document.getElementById("loader").style.display="flex";
}
function hideLoader(){
    document.getElementById("loader").style.display="none";
}
</script>
</body>
</html>
