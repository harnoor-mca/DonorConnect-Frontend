<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NGO Dashboard | DonorConnect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color:  #007070;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">DonorConnect - NGO Panel</span>
    <button class="btn btn-outline-warning" onclick="logout()">Logout</button>
</nav>

<div class="container mt-4">
    <h3 id="welcomeText" class="mb-4 text-white"></h3>
    <div class="card">
        <div class="card-header bg-warning fw-bold">
            Incoming Donation Requests
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Donor Name</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="donationTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function () {
    let storedUser = JSON.parse(localStorage.getItem("loggedInUser"));

    if (!storedUser || storedUser.role !== "NGO") {
        alert("Unauthorized Access!");
        window.location.href = "login.html";
        return;
    }
    document.getElementById("welcomeText").innerText =
        "Welcome, " + storedUser.name;
    renderTable();
});
function renderTable() {
    let storedUser = JSON.parse(localStorage.getItem("loggedInUser"));
    let donations = JSON.parse(localStorage.getItem("donations")) || [];
    let table = document.getElementById("donationTable");
    table.innerHTML = "";

    let myDonations = donations.filter(d =>
        d.ngoName === storedUser.name
    );
    if (myDonations.length === 0) {
        table.innerHTML = `<tr><td colspan="5">No donation requests found!</td></tr>`;
        return;
    }
    myDonations.forEach((donation) => {
        let row = `
            <tr>
                <td>${donation.donor}</td>
                <td>${donation.category}</td>
                <td>${donation.date}</td>
                <td>
                    <span class="badge 
                        ${donation.status === "Pending" ? "bg-secondary" :
                          donation.status === "Accepted" ? "bg-success" :
                          "bg-danger"}">
                        ${donation.status}
                    </span>
                </td>
                <td>
                    ${donation.status === "Pending" ? `
                        <button class="btn btn-success btn-sm me-2"
                            onclick="updateStatus('${donation.donoremail}','${donation.date}','${donation.category}','Accepted')">
                            Accept
                        </button>
                        <button class="btn btn-danger btn-sm"
                            onclick="updateStatus('${donation.donoremail}','${donation.date}','${donation.category}','Rejected')">
                            Reject
                        </button>
                    ` : "—"}
                </td>
            </tr>
        `;
        table.innerHTML += row;
    });
}
function updateStatus(donoremail, date, category, status) {
    let storedUser = JSON.parse(localStorage.getItem("loggedInUser"));
    let donations = JSON.parse(localStorage.getItem("donations")) || [];

    donations.forEach(d => {
        if (
            d.donoremail === donoremail &&
            d.date === date &&
            d.category === category &&
            d.ngoName === storedUser.name
        ) {
            d.status = status;

            if (status === "Accepted") {
                d.ngoContactName = storedUser.name;
                d.ngoContactEmail = storedUser.email;
                d.ngoContactPhone = storedUser.phone; 
            }
        }
    });

    localStorage.setItem("donations", JSON.stringify(donations));

    renderTable();
}

function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}
</script>

</body>
</html>
