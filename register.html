<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
   <style>
    body{
        background: linear-gradient( rgba(0, 50, 54, 0.5),rgb(0, 0, 0)),url(Images/background.jpg);
        background-repeat: no-repeat;
        background-size:cover ;
        font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        font-size: large;
        background-attachment: fixed;
    }
    .w-30{
        width: 30%;
    }
    .navbar{
      background-color:  #007070;
      color: rgb(255, 255, 255);
      text-decoration: underline;
    }
    .card1 {
    
    background: rgb(212, 255, 249);
    padding: 10px;
    margin: 10px;
    width: 200px;
    box-shadow: 0 0 15px rgba(0, 0, 0, 0.904);
    border-radius: 5px;
    border-color: #c9cc00;
    
}
.btn:hover{
 background-color: #000000;
 color:#feffff;
 font-weight: bolder;
}
.btn{
 background-color: #00271ffd;
 color:#ffffff;
}
h3{
  font-size:xx-large;
  font-weight: bolder;
  font-family:'Times New Roman', Times, serif;
}
label{
  color: #000000;
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif ;
  font-weight:bolder;
}
.form-control{
  font-weight: bold;
  
}
input{
  color: #505050;
}
  </style>
</head>
<body class="reg text-white" > 
  <nav class="navbar  justify-content-center">
    <div class="nav-brand ">
     <h2><b>DonorConnect</b></h2></div>
  </nav>
  <section id="register">
  <div class=" container d-flex align-items-center justify-content-center dvh-100">
    
    <div class="row card1" style="max-width:700%; width: 70%; ">
      <b><h3 class="mb-4 text-center text-dark">Register Here</h3></b>
       
      <div class="col-md-6 py-2 ">
         <form onsubmit="registerUser(event,this)">
          <div class="mb-3">
            <label>Name</label>
            <input type="text" name="name" class="form-control bg-light text-dark border-secondary" placeholder="Enter Full Name" required />
          </div>
          <div class="mb-3">
            <label>Email</label>
            <input type="email" name="email" class="form-control bg-light text-dark border-secondary" placeholder="Enter your Email" required />
          </div>
          
          <div class="mb-3">
            <input type="text" name="city" class="form-control bg-light text-dark border-secondary" placeholder="City" required/>
          </div>
          <div class="mb-3">
            <input type="tel" name="tel" class="form-control bg-light text-dark border-secondary" placeholder="Mobile number" required/>
          </div>
          <div class="mb-2">
            <label>Password</label>
            <input type="password" name="password" class="form-control bg-light text-dark border-secondary" placeholder="Create your password" required />
          </div>
        </div>
          <div class="col-md-6 py-2">
          <div>
            <label>Who are you?</label>
          <select name="role" id="role" class="form-control border-secondary mb-3" required>
            <option value="">Select role</option>
            <option value="Donor">Donor</option>
            <option value="ngo">NGO</option>
          </select>
        </div>
        <div id="ngoFields" class="mb-3">
          <label>Address</label>
          <input type="text" name="address" id="addresses" placeholder="Address of NGO" class="form-control border-secondary bg-light text-dark mb-3 ">
          <label>Categories</label>
          <input type="text" name="category" id="categories" placeholder="Accepted Categories" class="form-control border-secondary bg-light text-dark ">
        </div>
        
          <div class="form-check mb-4 justify-content-start align-items-start">
            <input class="form-check-input" type="checkbox" id="terms" required />
            <label class="form-check-label text-dark" for="terms">
              I agree to the Terms & Conditions
            </label> 
          </div>
          
          <button type="submit" class="btn btn-outline-light w-100 mb-3"><b>Create Account</b></button>
          
        </form>
       <p class="mt-3 text-center text-dark"><b>
          Already have an account? </b> <a href="login.html" class="btn btn-outline-light text-decoration-none ">Login</a>
        </p> 
      </div>
    </div>
  </div>
</section>

<script>
function registerUser(event, form){
  event.preventDefault();

  let name = form.name.value.trim();
  let email = form.email.value.trim().toLowerCase();
  let password = form.password.value.trim();
  let city = form.city.value.trim();
  let role = form.role.value.trim();
  let tel=form.tel.value.trim();

  if(role === ""){
    alert("Please select a role");
    return;
  }

 

let users=JSON.parse(localStorage.getItem("users")) || [];
let ngos=JSON.parse(localStorage.getItem("ngos")) || [];
let existingUser=users.find(u=>u.email=== email);
let existingNgo=ngos.find(n=>n.email===email);
if(existingUser || existingNgo){
  alert("Email already registered");
  window.location.href="login.html";
}

  let user = {
    name: name,
    email: email,
    password: password,
    role: role,
    city: city,
    tel: tel
  };

  if(role === "ngo"){
    user.categories = [];  
    ngos.push(user);
    localStorage.setItem("ngos", JSON.stringify(ngos));
  } 
  else {
    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));
  }
  window.location.href = "login.html";
 }

const roleSelect= document.getElementById("role");
const ngoFields=document.getElementById("ngoFields");
roleSelect.addEventListener("change",function(){
  if (this.value==="ngo"){
    ngoFields.style.display="block";
    
    
  }
  else{
    ngoFields.style.display="none";
  }
});
</script>
</body>
</html>
