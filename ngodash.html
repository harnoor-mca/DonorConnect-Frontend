<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NGO Dashboard | DonorConnect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color:  #007070;
        }
        .card {
            border-radius: 12px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">DonorConnect - NGO Panel</span>
    <button class="btn btn-outline-warning" onclick="logout()">Logout</button>
</nav>

<div class="container mt-4">
    <h3 id="welcomeText" class="mb-4 text-white"></h3>
    <div class="card">
        <div class="card-header bg-warning fw-bold">
            Incoming Donation Requests
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-bordered text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>Donor Name</th>
                            <th>Category</th>
                            <th>Date</th>
                            <th>Status</th>
                            <th>Action</th>
                            <th>Phone</th>
                        </tr>
                    </thead>
                    <tbody id="donationTable">
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>


<script>
document.addEventListener("DOMContentLoaded", function () {
    let storedUser = JSON.parse(localStorage.getItem("loggedInUser"));

    if (!storedUser || storedUser.role !== "ngo") {
        alert("Unauthorized Access!");
        window.location.href = "login.html";
        return;
    }
    document.getElementById("welcomeText").innerText =
        "Welcome, " + storedUser.user.organisation_name;
    renderTable();
});

function renderTable() {
    let user = JSON.parse(localStorage.getItem("loggedInUser"));

    fetch(`http://localhost:5000/api/ngo-requests/${user.user.ngo_id}`)
    .then(res => res.json())
    .then(data => {
        let table = document.getElementById("donationTable");
        table.innerHTML = "";

        if(data.length === 0){
            table.innerHTML = `<tr><td colspan="5">No donation requests found!</td></tr>`;
            return;
        }

        data.forEach(donation => {
            let row = `
<tr>
    <td>${donation.full_name}</td>
    <td>${donation.donation_type}</td>
    <td>${donation.request_date.split("T")[0]}</td>
    
    <td>
        <span class="badge 
            ${donation.status === "Pending" ? "bg-secondary" :
              donation.status === "Accepted" ? "bg-success" :
              "bg-danger"}">
            ${donation.status}
        </span>
    </td>
    <td>
        <td>${donation.status==="Accepted"?donation.phone:"Hidden"}</td>
        ${donation.status === "Pending" ? `
            <button class="btn btn-success btn-sm"
                onclick="updateStatus(${donation.request_id}, 'Accepted')">
                Accept
            </button>
            <button class="btn btn-danger btn-sm"
                onclick="updateStatus(${donation.request_id}, 'Rejected')">
                Reject
            </button>
        ` : ""}
    </td>
</tr>
`;
            table.innerHTML += row;
        });
    })
    .catch(err => console.log(err));
}

function updateStatus(id, status){
    fetch(`http://localhost:5000/api/donation/${id}`, {
        method: "PUT",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ status })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message);
        renderTable();
    })
    .catch(err => console.log(err));
}
function logout() {
    localStorage.removeItem("loggedInUser");
    window.location.href = "login.html";
}
</script>

</body>
</html>
